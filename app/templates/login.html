<!DOCTYPE html>
<html>
<head>
    <title>FinMark Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
    <div class="auth-background">
        <div class="auth-card">
            <div class="brand-badge">FM</div>

            <p class="small-title">FinMark Platform</p>
            <h1>Login</h1>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input class="form-control modern-input" type="email" id="email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control modern-input" type="password" id="password" required>
                </div>

                <button class="btn modern-btn w-100" type="submit" id="loginButton">
                    Sign in
                </button>
            </form>

            <p id="message" class="mt-3 fw-bold text-danger"></p>

            <div class="auth-footer">
                <span>No account yet?</span>
                <a href="/register">Create user</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById("loginForm");
        const message = document.getElementById("message");
        const button = document.getElementById("loginButton");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();

            message.innerText = "";
            button.disabled = true;
            button.innerText = "Signing in...";

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.innerText = data.detail || "Login failed.";
                    button.disabled = false;
                    button.innerText = "Sign in";
                    return;
                }

                localStorage.setItem("finmark_token", data.token);
                localStorage.setItem("finmark_user", JSON.stringify(data.user));

                window.location.href = "/dashboard";

            } catch (error) {
                message.innerText = "Unable to connect to the server.";
                button.disabled = false;
                button.innerText = "Sign in";
            }
        });
    </script>
</body>
</html>
