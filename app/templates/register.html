<!DOCTYPE html>
<html>
<head>
    <title>FinMark Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
    <div class="auth-background">
        <div class="register-card">
            <div class="brand-badge">FM</div>

            <p class="small-title">FinMark User Setup</p>
            <h1>Create User</h1>
            <p class="muted-text">
                Register a real user account in the local SQLite database.
            </p>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input class="form-control modern-input" type="text" id="name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input class="form-control modern-input" type="email" id="email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control modern-input" type="password" id="password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select class="form-select modern-input" id="role" required>
                        <option value="coo">COO</option>
                        <option value="admin">Admin</option>
                        <option value="finance">Finance</option>
                        <option value="operations">Operations</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <select class="form-select modern-input" id="department" required>
                        <option value="executive">Executive</option>
                        <option value="finance">Finance</option>
                        <option value="operations">Operations</option>
                        <option value="sales">Sales</option>
                    </select>
                </div>

                <button class="btn modern-btn w-100" type="submit" id="registerButton">
                    Create Account
                </button>
            </form>

            <p id="message" class="mt-3 fw-bold"></p>

            <div class="auth-footer">
                <span>Already have an account?</span>
                <a href="/">Back to login</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById("registerForm");
        const message = document.getElementById("message");
        const button = document.getElementById("registerButton");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();

            message.innerText = "";
            message.className = "mt-3 fw-bold";
            button.disabled = true;
            button.innerText = "Creating account...";

            const payload = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                role: document.getElementById("role").value,
                department: document.getElementById("department").value
            };

            try {
                const response = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    message.className = "mt-3 fw-bold text-danger";
                    message.innerText = data.detail || "Registration failed.";
                    button.disabled = false;
                    button.innerText = "Create Account";
                    return;
                }

                message.className = "mt-3 fw-bold text-success";
                message.innerText = "Registration successful. Redirecting to login...";

                setTimeout(() => {
                    window.location.href = "/";
                }, 1200);

            } catch (error) {
                message.className = "mt-3 fw-bold text-danger";
                message.innerText = "Unable to connect to the server.";
                button.disabled = false;
                button.innerText = "Create Account";
            }
        });
    </script>
</body>
</html>
